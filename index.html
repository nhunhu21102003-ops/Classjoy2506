<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyfulClass - Quản lý lớp học hạnh phúc</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Khởi tạo Firebase phiên bản Compat (Dễ chạy trên trình duyệt nhất)
        const firebaseConfig = {
            apiKey: "AIzaSyA_bCjtuPvQ2VvTQCMvaE2LZx-wGPIrsaM",
            authDomain: "classjoy-1002f.firebaseapp.com",
            projectId: "classjoy-1002f",
            storageBucket: "classjoy-1002f.firebasestorage.app",
            messagingSenderId: "598580384018",
            appId: "1:598580384018:web:bd967c01cf077db61d23cb"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const { useState, useEffect } = React;

        function App() {
            // Icons
            const { Heart, LogIn, Plus, LogOut, ChevronLeft, Trophy, Trash2 } = lucide;

            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [classes, setClasses] = useState([]);
            const [activeClassId, setActiveClassId] = useState(null);
            const [showClassModal, setShowClassModal] = useState(false);
            const [showStudentModal, setShowStudentModal] = useState(false);
            const [newClassName, setNewClassName] = useState('');
            const [newClassMax, setNewClassMax] = useState(10);
            const [newStudentName, setNewStudentName] = useState('');

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                }, (error) => {
                    console.error("Lỗi Auth:", error);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) {
                    setClasses([]);
                    return;
                }
                const unsub = db.collection('users').doc(user.uid).collection('classes')
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        setClasses(data);
                    }, (err) => console.error("Lỗi Firestore:", err));
                return () => unsub();
            }, [user]);

            const handleLogin = async () => {
                try {
                    await auth.signInWithPopup(googleProvider);
                } catch (err) {
                    alert("Lỗi đăng nhập: " + err.message);
                }
            };

            const handleLogout = () => { auth.signOut(); setActiveClassId(null); };

            const handleCreateClass = async (e) => {
                e.preventDefault();
                if (!newClassName.trim() || !user) return;
                const id = Date.now().toString();
                await db.collection('users').doc(user.uid).collection('classes').doc(id).set({
                    name: newClassName,
                    maxPoints: parseInt(newClassMax) || 10,
                    students: [],
                    createdAt: new Date().toISOString()
                });
                setNewClassName(''); setShowClassModal(false);
            };

            const handleAddStudent = async (e) => {
                e.preventDefault();
                if (!newStudentName.trim() || !activeClassId) return;
                const emojis = ['🐰', '🦊', '🐻', '🐼', '🐱', '🐶'];
                const colors = ['bg-pink-100', 'bg-orange-100', 'bg-yellow-100', 'bg-gray-100', 'bg-purple-100'];
                const student = { 
                    id: Date.now().toString(), 
                    name: newStudentName, 
                    points: 0, 
                    avatar: emojis[Math.floor(Math.random() * emojis.length)], 
                    avatarColor: colors[Math.floor(Math.random() * colors.length)] 
                };
                await db.collection('users').doc(user.uid).collection('classes').doc(activeClassId).update({
                    students: firebase.firestore.FieldValue.arrayUnion(student)
                });
                setNewStudentName(''); setShowStudentModal(false);
            };

            const updatePoints = async (studentId, amount) => {
                const cls = classes.find(c => c.id === activeClassId);
                const updated = cls.students.map(s => {
                    if (s.id === studentId) {
                        const pts = Math.max(0, Math.min(s.points + amount, cls.maxPoints));
                        if (amount > 0 && pts === cls.maxPoints) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        return { ...s, points: pts };
                    }
                    return s;
                });
                await db.collection('users').doc(user.uid).collection('classes').doc(activeClassId).update({ students: updated });
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-pink-50 text-pink-500 font-black text-2xl">
                    ĐANG TẢI...
                </div>
            );

            if (!user) return (
                <div className="min-h-screen bg-[#FFF5F7] flex items-center justify-center p-6 text-center">
                    <div className="bg-white p-10 rounded-[40px] shadow-2xl border-8 border-pink-100 max-w-md w-full">
                        <div className="flex justify-center mb-4 text-pink-400">❤️</div>
                        <h1 className="text-4xl font-black text-pink-600 mb-8">JoyfulClass</h1>
                        <button onClick={handleLogin} className="w-full bg-pink-400 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 hover:bg-pink-500 transition-all">
                             ĐĂNG NHẬP GOOGLE
                        </button>
                    </div>
                </div>
            );

            const activeClass = classes.find(c => c.id === activeClassId);

            return (
                <div className="min-h-screen bg-[#FFF5F7] flex flex-col font-sans text-gray-800">
                    <header className="bg-white p-4 border-b-4 border-pink-100 flex justify-between items-center px-8">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveClassId(null)}>
                            <div className="bg-pink-400 p-2 rounded-xl text-white">❤️</div>
                            <span className="text-xl font-black text-pink-600">JoyfulClass</span>
                        </div>
                        <button onClick={handleLogout} className="text-rose-400 font-bold">THOÁT</button>
                    </header>

                    <main className="flex-1 p-8 max-w-6xl mx-auto w-full">
                        {!activeClassId ? (
                            <div>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-3xl font-black text-pink-700">Lớp của tôi</h2>
                                    <button onClick={() => setShowClassModal(true)} className="bg-pink-400 text-white p-4 rounded-full shadow-lg">+</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {classes.map(cls => (
                                        <div key={cls.id} onClick={() => setActiveClassId(cls.id)} className="bg-white p-8 rounded-[32px] shadow-md border-4 border-transparent hover:border-pink-200 cursor-pointer transition-all">
                                            <h3 className="text-2xl font-black text-pink-600">{cls.name}</h3>
                                            <p className="text-gray-400 font-bold mt-2">{cls.students?.length || 0} Học sinh</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div>
                                <button onClick={() => setActiveClassId(null)} className="mb-6 text-pink-400 font-bold tracking-tighter">← TRỞ VỀ</button>
                                <div className="bg-white p-8 rounded-[40px] shadow-lg border-4 border-pink-100 mb-8">
                                    <h2 className="text-4xl font-black text-pink-700 mb-2">{activeClass?.name}</h2>
                                    <p className="text-amber-500 font-black uppercase">Mục tiêu: {activeClass?.maxPoints} Điểm</p>
                                </div>
                                <div className="flex justify-end mb-6">
                                    <button onClick={() => setShowStudentModal(true)} className="bg-rose-400 text-white px-6 py-3 rounded-2xl font-black shadow-md">+ HỌC SINH</button>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                                    {activeClass?.students.map(s => (
                                        <div key={s.id} className="bg-white p-6 rounded-[32px] border-4 border-pink-50 text-center flex flex-col items-center">
                                            <div className={`${s.avatarColor} w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mb-4`}>{s.avatar}</div>
                                            <p className="font-black text-gray-700 truncate w-full">{s.name}</p>
                                            <p className="text-3xl font-black text-pink-500 my-4">{s.points}</p>
                                            <div className="flex gap-2 w-full">
                                                <button onClick={() => updatePoints(s.id, -1)} className="flex-1 bg-gray-100 rounded-lg py-2 font-bold">-</button>
                                                <button onClick={() => updatePoints(s.id, 1)} className="flex-1 bg-pink-400 text-white rounded-lg py-2 font-bold">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showClassModal && (
                        <div className="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black mb-6">Thêm lớp mới</h2>
                                <form onSubmit={handleCreateClass} className="flex flex-col gap-4">
                                    <input autoFocus placeholder="Tên lớp" className="bg-gray-100 p-4 rounded-2xl outline-none font-bold" value={newClassName} onChange={e => setNewClassName(e.target.value)} />
                                    <input type="number" placeholder="Điểm mục tiêu" className="bg-gray-100 p-4 rounded-2xl outline-none font-bold" value={newClassMax} onChange={e => setNewClassMax(e.target.value)} />
                                    <button className="bg-pink-400 text-white py-4 rounded-2xl font-black shadow-lg">TẠO NGAY</button>
                                    <button type="button" onClick={() => setShowClassModal(false)} className="text-gray-400 font-bold">HỦY</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showStudentModal && (
                        <div className="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl">
                                <h2 className="text-2xl font-black mb-6">Thêm học sinh</h2>
                                <form onSubmit={handleAddStudent} className="flex flex-col gap-4">
                                    <input autoFocus placeholder="Tên học sinh" className="bg-gray-100 p-4 rounded-2xl outline-none font-bold" value={newStudentName} onChange={e => setNewStudentName(e.target.value)} />
                                    <button className="bg-rose-400 text-white py-4 rounded-2xl font-black shadow-lg">THÊM VÀO</button>
                                    <button type="button" onClick={() => setShowStudentModal(false)} className="text-gray-400 font-bold">HỦY</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
