<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassJoy - Student Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <section id="auth-screen" class="container">
            <h1 style="color: #ffb7ce;">Teacher Login</h1>
            <div class="card">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button id="login-btn">Enter Classroom</button>
            </div>
        </section>

        <section id="dashboard-screen" class="container hidden">
            <header>
                <h2>Teacher's Dashboard</h2>
                <button class="btn-danger" id="logout-btn">Logout</button>
            </header>
            
            <div class="controls">
                <input type="text" id="new-class-name" placeholder="Class Name (e.g. 10A1)">
                <button id="add-class-btn">+ Create Class</button>
            </div>

            <div id="class-list" class="grid"></div>
        </section>

        <section id="class-detail-screen" class="container hidden">
            <header>
                <button id="back-btn">← Back</button>
                <h2 id="current-class-title">Class Name</h2>
                <button class="btn-danger" id="delete-class-btn">Delete Class</button>
            </header>

            <div class="settings-bar card">
                <span>Max Points for Level Up: </span>
                <input type="number" id="max-points-input" value="10">
            </div>

            <div class="controls">
                <input type="text" id="new-student-name" placeholder="Student Name">
                <button id="add-student-btn">Add Student</button>
            </div>

            <div id="student-list" class="grid"></div>
        </section>
    </div>

    <audio id="snd-point" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-level" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script type="module" src="script.js"></script>
</body>
</html>
