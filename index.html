<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassJoy Hot Pink - Student Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <section id="auth-screen" class="auth-container">
            <div class="auth-box card">
                <h1 class="main-title">ClassJoy 💖</h1>
                <p style="margin-bottom: 20px; color: #834055; font-weight: bold;">Teacher Entrance</p>
                
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                    <button id="login-btn" style="width: 100%; margin-top: 10px;">Login 🎀</button>
                </div>

                <div class="divider"><span>OR</span></div>

                <button id="google-login-btn" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" alt="G">
                    Sign in with Google
                </button>
            </div>
        </section>

        <section id="dashboard-screen" class="container hidden">
            <header>
                <h2 class="section-title">My Classes </h2>
                <div id="user-info" class="user-badge"></div>
                <button class="btn-logout" id="logout-btn">Logout </button>
            </header>
            
            <div class="controls card-heavy">
                <input type="text" id="new-class-name" placeholder="Class Name...">
                <button id="add-class-btn">+ Create Class</button>
            </div>

            <div id="class-list" class="grid"></div>
        </section>

        <section id="class-detail-screen" class="container hidden">
            <header>
                <button id="back-btn" class="btn-back">← Back</button>
                <h2 id="current-class-title" class="section-title">Class Name</h2>
                <button class="btn-danger" id="delete-class-btn">Delete Class </button>
            </header>

            <div class="settings-bar card-heavy">
                <span>Level Up Threshold: </span>
                <input type="number" id="max-points-input" value="10">
            </div>

            <div class="controls card-heavy">
                <input type="text" id="new-student-name" placeholder="Student Name...">
                <button id="add-student-btn">Add Student </button>
            </div>

            <div id="student-list" class="grid"></div>
        </section>
    </div>

    <audio id="snd-point" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-level" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script type="module" src="script.js"></script>
</body>
</html>
