<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyfulClass - Happy Classroom Management</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; margin: 0; padding: 0; }
        .winner-card { animation: celebrate 2s infinite; border-color: #fbbf24 !important; }
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
        }
    </style>
</head>
<body class="bg-[#FFF5F7]">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyA_bCjtuPvQ2VvTQCMvaE2LZx-wGPIrsaM",
            authDomain: "classjoy-1002f.firebaseapp.com",
            projectId: "classjoy-1002f",
            storageBucket: "classjoy-1002f.firebasestorage.app",
            messagingSenderId: "598580384018",
            appId: "1:598580384018:web:bd967c01cf077db61d23cb"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const { useState, useEffect, useMemo } = React;

        function App() {
            const { Heart, LogIn, Plus, LogOut, ChevronLeft, Trophy, Trash2, RefreshCcw, UserPlus, Star } = lucide;

            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [classes, setClasses] = useState([]);
            const [activeClassId, setActiveClassId] = useState(null);
            const [modals, setModals] = useState({ class: false, student: false });
            const [formData, setFormData] = useState({ className: '', maxPoints: 10, studentName: '' });

            useEffect(() => {
                return auth.onAuthStateChanged((u) => { 
                    setUser(u); 
                    setLoading(false); 
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = db.collection('users').doc(user.uid).collection('classes')
                    .onSnapshot(snap => {
                        setClasses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                return () => unsubscribe();
            }, [user]);

            const handleLogin = () => auth.signInWithPopup(googleProvider).catch(e => alert(e.message));
            const handleLogout = () => { auth.signOut(); setActiveClassId(null); };

            const createClass = async (e) => {
                e.preventDefault();
                if (!formData.className.trim()) return;
                await db.collection('users').doc(user.uid).collection('classes').add({
                    name: formData.className,
                    maxPoints: parseInt(formData.maxPoints) || 10,
                    students: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setFormData({...formData, className: ''});
                setModals({...modals, class: false});
            };

            const deleteClass = async (id, e) => {
                e.stopPropagation();
                if (confirm("Delete this class?")) {
                    await db.collection('users').doc(user.uid).collection('classes').doc(id).delete();
                }
            };

            const addStudent = async (e) => {
                e.preventDefault();
                if (!formData.studentName.trim()) return;
                const emojis = ['🐰', '🦊', '🐻', '🐼', '🐱', '🐶', '🦁', '🐨', '🐯'];
                const colors = ['bg-pink-100', 'bg-orange-100', 'bg-yellow-100', 'bg-blue-100', 'bg-purple-100', 'bg-green-100'];
                const newStudent = {
                    id: Date.now().toString(),
                    name: formData.studentName,
                    points: 0,
                    avatar: emojis[Math.floor(Math.random() * emojis.length)],
                    avatarColor: colors[Math.floor(Math.random() * colors.length)]
                };
                await db.collection('users').doc(user.uid).collection('classes').doc(activeClassId).update({
                    students: firebase.firestore.FieldValue.arrayUnion(newStudent)
                });
                setFormData({...formData, studentName: ''});
                setModals({...modals, student: false});
            };

            const updatePoints = async (sId, val) => {
                const cls = classes.find(c => c.id === activeClassId);
                const updated = cls.students.map(s => {
                    if (s.id === sId) {
                        const newPts = Math.max(0, s.points + val);
                        if (val > 0 && newPts === cls.maxPoints) {
                            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                        }
                        return { ...s, points: newPts };
                    }
                    return s;
                });
                await db.collection('users').doc(user.uid).collection('classes').doc(activeClassId).update({ students: updated });
            };

            const deleteStudent = async (sId) => {
                if (!confirm("Remove student?")) return;
                const cls = classes.find(c => c.id === activeClassId);
                const updated = cls.students.filter(s => s.id !== sId);
                await db.collection('users').doc(user.uid).collection('classes').doc(activeClassId).update({ students: updated });
            };

            const resetPoints = async () => {
                if (!confirm("Reset all points to 0?")) return;
                const cls = classes.find(c => c.id === activeClassId);
                const updated = cls.students.map(s => ({ ...s, points: 0 }));
                await db.collection('users').doc(user.uid).collection('classes').doc(activeClassId).update({ students: updated });
            };

            const activeClass = classes.find(c => c.id === activeClassId);
            const sortedStudents = useMemo(() => {
                return activeClass ? [...activeClass.students].sort((a, b) => b.points - a.points) : [];
            }, [activeClass]);

            if (loading) return <div className="flex h-screen items-center justify-center">Loading...</div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="bg-white p-12 rounded-[50px] shadow-2xl text-center max-w-md w-full">
                        <Heart className="mx-auto mb-6 text-pink-500" size={48} fill="currentColor"/>
                        <h1 className="text-4xl font-black text-pink-600 mb-2">JoyfulClass</h1>
                        <p className="text-gray-400 mb-10 italic">English Version</p>
                        <button onClick={handleLogin} className="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3">
                            <LogIn size={20}/> SIGN IN WITH GOOGLE
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b-2 border-pink-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveClassId(null)}>
                            <Star className="text-pink-500" size={24} fill="currentColor"/>
                            <h2 className="text-xl font-bold text-pink-600">JoyfulClass</h2>
                        </div>
                        <button onClick={handleLogout} className="text-rose-400 p-2"><LogOut size={20}/></button>
                    </header>

                    <main className="flex-1 p-6 max-w-7xl mx-auto w-full">
                        {!activeClassId ? (
                            <section>
                                <div className="flex justify-between items-center mb-8">
                                    <h1 className="text-3xl font-black text-gray-800">Welcome! 👋</h1>
                                    <button onClick={() => setModals({...modals, class: true})} className="bg-pink-500 text-white p-4 rounded-2xl shadow-lg"><Plus size={24}/></button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {classes.map(cls => (
                                        <div key={cls.id} onClick={() => setActiveClassId(cls.id)} className="bg-white p-8 rounded-[40px] shadow-sm relative cursor-pointer border-2 border-transparent hover:border-pink-200 transition-all">
                                            <button onClick={(e) => deleteClass(cls.id, e)} className="absolute top-6 right-6 text-gray-300 hover:text-rose-500"><Trash2 size={18}/></button>
                                            <Trophy className="text-pink-400 mb-4" size={32}/>
                                            <h3 className="text-2xl font-bold text-gray-800">{cls.name}</h3>
                                            <p className="text-pink-400 text-sm font-bold uppercase mt-2">{cls.students?.length || 0} Students | Goal: {cls.maxPoints}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ) : (
                            <section>
                                <div className="flex justify-between items-center mb-8">
                                    <button onClick={() => setActiveClassId(null)} className="flex items-center gap-2 font-bold text-gray-400 hover:text-pink-500 transition-colors">
                                        <ChevronLeft size={20}/> BACK
                                    </button>
                                    <div className="flex gap-2">
                                        <button onClick={resetPoints} className="bg-white border-2 border-pink-100 text-pink-500 px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2">
                                            <RefreshCcw size={16}/> RESET
                                        </button>
                                        <button onClick={() => setModals({...modals, student: true})} className="bg-pink-500 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2">
                                            <UserPlus size={16}/> ADD
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white p-10 rounded-[50px] border-4 border-pink-50 mb-10 flex flex-col md:flex-row justify-between items-center">
                                    <h2 className="text-4xl font-black text-gray-800">{activeClass?.name}</h2>
                                    <p className="text-amber-500 font-bold">GOAL: {activeClass?.maxPoints} POINTS</p>
                                </div>

                                <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-6">
                                    {sortedStudents.map(s => {
                                        const isWinner = s.points >= activeClass.maxPoints;
                                        return (
                                            <div key={s.id} className={`bg-white p-6 rounded-[35px] border-4 flex flex-col items-center relative ${isWinner ? 'winner-card' : 'border-gray-50'}`}>
                                                <button onClick={() => deleteStudent(s.id)} className="absolute top-4 right-4 text-gray-200 hover:text-rose-500"><Trash2 size={14}/></button>
                                                <div className={`${s.avatarColor} w-20 h-20 rounded-3xl flex items-center justify-center text-4xl mb-4`}>
                                                    {isWinner ? '👑' : s.avatar}
                                                </div>
                                                <p className="font-bold text-gray-700 mb-1">{s.name}</p>
                                                <div className="text-3xl font-black text-pink-500 my-2">{s.points}</div>
                                                <div className="flex gap-2 w-full">
                                                    <button onClick={() => updatePoints(s.id, -1)} className="flex-1 bg-gray-50 py-2 rounded-xl font-bold">-</button>
                                                    <button onClick={() => updatePoints(s.id, 1)} className="flex-1 bg-pink-500 text-white py-2 rounded-xl font-bold">+</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        )}
                    </main>

                    {modals.class && (
                        <div className="fixed inset-0 z-50 bg-black/20 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-[40px] w-full max-w-sm">
                                <h2 className="text-xl font-bold mb-4 text-center">New Class</h2>
                                <form onSubmit={createClass} className="flex flex-col gap-4">
                                    <input placeholder="Class Name" className="bg-gray-50 p-4 rounded-xl border-none outline-none" value={formData.className} onChange={e => setFormData({...formData, className: e.target.value})} />
                                    <input type="number" placeholder="Goal Points" className="bg-gray-50 p-4 rounded-xl border-none outline-none" value={formData.maxPoints} onChange={e => setFormData({...formData, maxPoints: e.target.value})} />
                                    <button className="bg-pink-500 text-white py-4 rounded-xl font-bold">CREATE</button>
                                    <button type="button" onClick={() => setModals({...modals, class: false})} className="text-gray-400">Cancel</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {modals.student && (
                        <div className="fixed inset-0 z-50 bg-black/20 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-[40px] w-full max-w-sm">
                                <h2 className="text-xl font-bold mb-4 text-center">Add Student</h2>
                                <form onSubmit={addStudent} className="flex flex-col gap-4">
                                    <input placeholder="Student Name" className="bg-gray-50 p-4 rounded-xl border-none outline-none" value={formData.studentName} onChange={e => setFormData({...formData, studentName: e.target.value})} />
                                    <button className="bg-pink-500 text-white py-4 rounded-xl font-bold">ADD</button>
                                    <button type="button" onClick={() => setModals({...modals, student: false})} className="text-gray-400">Cancel</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
