<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyfulClass - Quản lý lớp học</title>

    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf2f8; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyA_bCjtuPvQ2VvTQCMvaE2LZx-wGPIrsaM",
            authDomain: "classjoy-1002f.firebaseapp.com",
            projectId: "classjoy-1002f",
            storageBucket: "classjoy-1002f.firebasestorage.app",
            messagingSenderId: "598580384018",
            appId: "1:598580384018:web:bd967c01cf077db61d23cb"
        };

        // Khởi tạo Firebase an toàn
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);

            // Theo dõi trạng thái đăng nhập
            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (error) {
                    alert("Lỗi đăng nhập: " + error.message);
                }
            };

            if (loading) {
                return (
                    <div className="flex h-screen items-center justify-center">
                        <div className="text-pink-500 font-bold animate-bounce">Đang khởi tạo JoyfulClass...</div>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[40px] shadow-2xl border-t-8 border-pink-400 text-center max-w-sm w-full">
                            <h1 className="text-4xl font-black text-pink-600 mb-2">JoyfulClass</h1>
                            <p className="text-gray-400 mb-8 italic text-sm">Happy Classroom Management</p>
                            <button 
                                onClick={handleLogin}
                                className="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-pink-600 active:scale-95 transition-all"
                            >
                                ĐĂNG NHẬP GOOGLE
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 max-w-2xl mx-auto">
                    <header className="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
                        <div>
                            <h2 className="font-bold text-pink-600">JoyfulClass</h2>
                            <p className="text-xs text-gray-500">{user.displayName}</p>
                        </div>
                        <button 
                            onClick={() => auth.signOut()}
                            className="text-xs font-bold text-red-400 hover:text-red-600"
                        >
                            Đăng xuất
                        </button>
                    </header>

                    <div className="bg-white p-8 rounded-[30px] shadow-sm text-center border-2 border-dashed border-pink-100">
                        <div className="text-5xl mb-4">🚀</div>
                        <h3 className="text-xl font-bold text-gray-800">Chào mừng bạn trở lại!</h3>
                        <p className="text-gray-500 mt-2 text-sm">Hệ thống Firebase đã kết nối thành công. Hãy bắt đầu xây dựng lớp học của bạn nhé.</p>
                    </div>
                </div>
            );
        }

        // Render ứng dụng
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (e) {
            console.error("Render Error:", e);
        }
    </script>
</body>
</html>
