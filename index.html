<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyfulClass - Quản lý lớp học hạnh phúc</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyA_bCjtuPvQ2VvTQCMvaE2LZx-wGPIrsaM",
            authDomain: "classjoy-1002f.firebaseapp.com",
            projectId: "classjoy-1002f",
            storageBucket: "classjoy-1002f.firebasestorage.app",
            messagingSenderId: "598580384018",
            appId: "1:598580384018:web:bd967c01cf077db61d23cb"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.googleProvider = new GoogleAuthProvider();
        window.fbMethods = { collection, doc, setDoc, onSnapshot, updateDoc, arrayUnion, deleteDoc, signInWithPopup, signOut, onAuthStateChanged };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Plus, Trash2, LogOut, Star, Trophy, Crown, 
            ChevronLeft, Users, X, Heart, Sparkles, LogIn 
        } = lucide;

        const ANIMAL_ICONS = [
            { id: 'rabbit', emoji: '🐰', color: 'bg-pink-100' },
            { id: 'fox', emoji: '🦊', color: 'bg-orange-100' },
            { id: 'bear', emoji: '🐻', color: 'bg-yellow-100' },
            { id: 'panda', emoji: '🐼', color: 'bg-gray-100' },
            { id: 'cat', emoji: '🐱', color: 'bg-purple-100' },
            { id: 'dog', emoji: '🐶', color: 'bg-amber-100' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [classes, setClasses] = useState([]);
            const [activeClassId, setActiveClassId] = useState(null);
            const [showClassModal, setShowClassModal] = useState(false);
            const [showStudentModal, setShowStudentModal] = useState(false);
            const [newClassName, setNewClassName] = useState('');
            const [newClassMax, setNewClassMax] = useState(10);
            const [newStudentName, setNewStudentName] = useState('');

            useEffect(() => {
                const unsub = window.fbMethods.onAuthStateChanged(window.auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = window.fbMethods.collection(window.db, 'users', user.uid, 'classes');
                const unsub = window.fbMethods.onSnapshot(q, (snapshot) => {
                    setClasses(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsub();
            }, [user]);

            const handleLogin = () => window.fbMethods.signInWithPopup(window.auth, window.googleProvider);
            const handleLogout = () => { window.fbMethods.signOut(window.auth); setActiveClassId(null); };

            const handleCreateClass = async (e) => {
                e.preventDefault();
                if (!newClassName.trim()) return;
                const id = Date.now().toString();
                await window.fbMethods.setDoc(window.fbMethods.doc(window.db, 'users', user.uid, 'classes', id), {
                    name: newClassName,
                    maxPoints: parseInt(newClassMax) || 10,
                    students: [],
                    createdAt: new Date().toISOString()
                });
                setNewClassName(''); setShowClassModal(false);
            };

            const handleAddStudent = async (e) => {
                e.preventDefault();
                if (!newStudentName.trim() || !activeClassId) return;
                const icon = ANIMAL_ICONS[Math.floor(Math.random() * ANIMAL_ICONS.length)];
                const student = { id: Date.now().toString(), name: newStudentName, points: 0, avatar: icon.emoji, avatarColor: icon.color };
                await window.fbMethods.updateDoc(window.fbMethods.doc(window.db, 'users', user.uid, 'classes', activeClassId), {
                    students: window.fbMethods.arrayUnion(student)
                });
                setNewStudentName(''); setShowStudentModal(false);
            };

            const updatePoints = async (studentId, amount) => {
                const cls = classes.find(c => c.id === activeClassId);
                const updated = cls.students.map(s => {
                    if (s.id === studentId) {
                        const pts = Math.max(0, Math.min(s.points + amount, cls.maxPoints));
                        if (amount > 0 && pts === cls.maxPoints) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        return { ...s, points: pts };
                    }
                    return s;
                });
                await window.fbMethods.updateDoc(window.fbMethods.doc(window.db, 'users', user.uid, 'classes', activeClassId), { students: updated });
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-pink-50 text-pink-500 font-black">LOADING...</div>;

            if (!user) return (
                <div className="min-h-screen bg-[#FFF5F7] flex items-center justify-center p-6 text-center">
                    <div className="bg-white p-12 rounded-[56px] shadow-2xl border-[12px] border-pink-100 max-w-md w-full">
                        <div className="flex justify-center mb-6"><Heart size={80} className="text-pink-400 fill-pink-400" /></div>
                        <h1 className="text-5xl font-black text-pink-600 mb-2">JoyfulClass</h1>
                        <p className="text-pink-300 font-bold mb-10 uppercase tracking-widest text-[10px]">Quản lý lớp học hạnh phúc</p>
                        <button onClick={handleLogin} className="w-full bg-pink-400 hover:bg-pink-500 text-white font-black py-6 rounded-[32px] shadow-xl flex items-center justify-center gap-4 transition-all active:scale-95">
                            <LogIn size={24} /> ĐĂNG NHẬP VỚI GOOGLE
                        </button>
                    </div>
                </div>
            );

            const activeClass = classes.find(c => c.id === activeClassId);

            return (
                <div className="min-h-screen bg-[#FFF5F7] flex flex-col">
                    <header className="bg-white/80 backdrop-blur-md border-b-4 border-pink-100 p-4 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto flex justify-between items-center px-4">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveClassId(null)}>
                                <div className="bg-pink-400 p-2 rounded-2xl shadow-lg"><Heart className="text-white fill-white" size={20} /></div>
                                <h2 className="text-2xl font-black text-pink-600">JoyfulClass</h2>
                            </div>
                            <button onClick={handleLogout} className="p-2 text-rose-400 hover:bg-rose-50 rounded-full"><LogOut size={24} /></button>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto p-8">
                        {!activeClassId ? (
                            <div className="space-y-10">
                                <div className="flex justify-between items-end">
                                    <h1 className="text-5xl font-black text-pink-700">Lớp của tôi</h1>
                                    <button onClick={() => setShowClassModal(true)} className="bg-pink-400 text-white p-6 rounded-[32px] shadow-2xl hover:scale-110 transition-all"><Plus size={40} /></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {classes.map(cls => (
                                        <div key={cls.id} onClick={() => setActiveClassId(cls.id)} className="bg-white p-10 rounded-[56px] shadow-xl hover:shadow-2xl cursor-pointer border-4 border-transparent hover:border-pink-200 transition-all">
                                            <h3 className="text-3xl font-black text-pink-700">{cls.name}</h3>
                                            <div className="mt-4 flex gap-2">
                                                <span className="px-3 py-1 bg-rose-50 text-rose-400 text-[10px] font-black rounded-full uppercase">{cls.students?.length || 0} HS</span>
                                                <span className="px-3 py-1 bg-amber-50 text-amber-500 text-[10px] font-black rounded-full uppercase">Mục tiêu: {cls.maxPoints}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-10">
                                <button onClick={() => setActiveClassId(null)} className="flex items-center gap-2 font-black text-pink-400 bg-white px-6 py-3 rounded-2xl border-2 border-pink-50 shadow-sm"><ChevronLeft size={20} /> TRỞ VỀ</button>
                                <div className="bg-gradient-to-br from-pink-400 to-orange-300 p-12 rounded-[56px] text-white shadow-2xl">
                                    <h1 className="text-6xl font-black mb-4">{activeClass?.name}</h1>
                                    <div className="flex items-center gap-2 font-bold bg-black/10 w-fit px-6 py-3 rounded-full"><Trophy size={20} className="text-yellow-300 fill-yellow-300" />Mục tiêu: {activeClass?.maxPoints} Điểm</div>
                                </div>
                                <div className="flex justify-end"><button onClick={() => setShowStudentModal(true)} className="bg-rose-400 text-white px-10 py-5 rounded-[28px] font-black shadow-xl hover:bg-rose-500 transition-all flex items-center gap-2"><Plus size={24} /> THÊM HỌC SINH</button></div>
                                <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-6">
                                    {activeClass?.students.map(s => (
                                        <div key={s.id} className={`p-8 rounded-[40px] border-4 transition-all text-center flex flex-col items-center ${s.points >= activeClass.maxPoints ? 'bg-pink-50 border-pink-200' : 'bg-white border-pink-50'}`}>
                                            <div className={`${s.avatarColor} w-20 h-20 rounded-[32px] flex items-center justify-center text-4xl mb-6 shadow-inner`}>{s.avatar}</div>
                                            <h4 className="font-black text-pink-700 truncate w-full mb-2">{s.name}</h4>
                                            <div className="text-4xl font-black mb-6 text-pink-400">{s.points}</div>
                                            <div className="flex gap-2 w-full mt-auto">
                                                <button onClick={() => updatePoints(s.id, -1)} className="flex-1 bg-white rounded-xl py-3 text-rose-300 font-bold border-2 border-pink-50">-</button>
                                                <button onClick={() => updatePoints(s.id, 1)} className="flex-1 bg-pink-400 rounded-xl py-3 text-white font-bold shadow-md">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showClassModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-pink-900/10 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-[48px] p-12 shadow-2xl border-[12px] border-pink-50">
                                <h2 className="text-3xl font-black text-pink-700 mb-8">Lớp mới</h2>
                                <form onSubmit={handleCreateClass} className="space-y-6">
                                    <input type="text" placeholder="Tên lớp" value={newClassName} onChange={e => setNewClassName(e.target.value)} className="w-full p-6 bg-pink-50 rounded-[24px] outline-none font-bold" />
                                    <input type="number" placeholder="Điểm mục tiêu" value={newClassMax} onChange={e => setNewClassMax(e.target.value)} className="w-full p-6 bg-pink-50 rounded-[24px] outline-none font-bold" />
                                    <button className="w-full bg-pink-400 text-white font-black py-6 rounded-[28px] text-xl">TẠO LỚP</button>
                                    <button type="button" onClick={() => setShowClassModal(false)} className="w-full text-pink-300 font-bold">HỦY</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showStudentModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-rose-900/10 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-[48px] p-12 shadow-2xl border-[12px] border-rose-50">
                                <h2 className="text-3xl font-black text-rose-700 mb-8">Thêm học sinh</h2>
                                <form onSubmit={handleAddStudent} className="space-y-6">
                                    <input type="text" placeholder="Tên học sinh" value={newStudentName} onChange={e => setNewStudentName(e.target.value)} className="w-full p-6 bg-rose-50 rounded-[24px] outline-none font-bold" />
                                    <button className="w-full bg-rose-400 text-white font-black py-6 rounded-[28px] text-xl">THÊM VÀO LỚP</button>
                                    <button type="button" onClick={() => setShowStudentModal(false)} className="w-full text-rose-300 font-bold">HỦY</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
